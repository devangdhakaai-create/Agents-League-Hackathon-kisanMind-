<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KisanMind — Agricultural Intelligence</title>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --text2: #999;
    --text3: #666;
    --accent: #7daa6f;
    --accent2: #5a8a4a;
    --critical: #e05555;
    --high: #e07a35;
    --medium: #d4a843;
    --low: #7daa6f;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  /* LAYOUT */
  .shell { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #0e0e0e;
  }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); display: inline-block; margin-right: 6px;
  }
  .topbar-right { font-size: 12px; color: var(--text3); display: flex; align-items: center; }

  .main { display: grid; grid-template-columns: 380px 1fr; flex: 1; }

  /* FORM PANEL */
  .form-panel {
    border-right: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    background: var(--surface);
  }
  .panel-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 20px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--text2); margin-bottom: 6px; letter-spacing: 0.2px;
  }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px; padding: 9px 12px;
    color: var(--text); font-family: var(--font); font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field select option { background: var(--surface2); }
  .field textarea { resize: vertical; min-height: 72px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-run {
    width: 100%; padding: 11px;
    background: var(--accent); color: #0e0e0e;
    border: none; border-radius: 6px;
    font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
    margin-top: 8px; letter-spacing: 0.2px;
  }
  .btn-run:hover { background: #8ebb7e; }
  .btn-run:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

  /* RESULT PANEL */
  .result-panel { padding: 24px; overflow-y: auto; }

  /* EMPTY STATE */
  .empty {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text3); gap: 12px; text-align: center;
  }
  .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty h3 { font-size: 15px; color: var(--text2); font-weight: 500; }
  .empty p { font-size: 13px; max-width: 280px; line-height: 1.5; }

  /* LOADING */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text2); font-size: 13px; }
  .loading-step {
    font-family: var(--mono); font-size: 11px;
    color: var(--text3); letter-spacing: 0.3px;
  }

  /* ADVISORY OUTPUT */
  .advisory { display: flex; flex-direction: column; gap: 20px; }

  .rec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 20px;
    border-left: 3px solid var(--accent);
  }
  .rec-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  }
  .rec-text { font-size: 16px; font-weight: 500; line-height: 1.4; }
  .rec-meta { display: flex; gap: 16px; margin-top: 12px; }
  .conf-badge {
    font-family: var(--mono); font-size: 12px;
    padding: 3px 8px; border-radius: 4px;
    background: var(--surface2); color: var(--text2);
  }
  .conf-high { color: var(--accent); }
  .conf-mid { color: var(--medium); }
  .conf-low { color: var(--critical); }

  .section-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .card-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
  }
  .card-value { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .reasoning-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 20px;
  }
  .reasoning-text {
    font-size: 13px; color: var(--text2); line-height: 1.7;
  }

  /* RISK FLAGS */
  .risk-list { display: flex; flex-direction: column; gap: 8px; }
  .risk-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .risk-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
  }
  .risk-dot.critical { background: var(--critical); }
  .risk-dot.high { background: var(--high); }
  .risk-dot.medium { background: var(--medium); }
  .risk-dot.low { background: var(--low); }
  .risk-sev {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 2px;
  }
  .risk-sev.critical { color: var(--critical); }
  .risk-sev.high { color: var(--high); }
  .risk-sev.medium { color: var(--medium); }
  .risk-sev.low { color: var(--low); }
  .risk-msg { font-size: 12px; color: var(--text2); }

  /* ACTIONS */
  .action-list { display: flex; flex-direction: column; gap: 8px; }
  .action-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .action-num {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); font-weight: 600;
    background: var(--surface2);
    padding: 2px 7px; border-radius: 4px;
    flex-shrink: 0; margin-top: 1px;
  }
  .action-text { font-size: 13px; color: var(--text); }
  .action-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* TRACE */
  .trace-list { display: flex; flex-direction: column; gap: 8px; }
  .trace-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px;
  }
  .trace-header { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
  .trace-step {
    font-family: var(--mono); font-size: 10px;
    color: var(--text3); background: var(--surface2);
    padding: 2px 6px; border-radius: 3px;
  }
  .trace-tool {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); font-weight: 500;
  }
  .trace-ms { font-size: 10px; color: var(--text3); margin-left: auto; }
  .trace-thought { font-size: 12px; color: var(--text2); line-height: 1.5; }

  /* SECTION HEADER */
  .sec-head {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .sec-head::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ERROR */
  .error-card {
    background: #1a0e0e; border: 1px solid #3a1a1a;
    border-radius: 8px; padding: 16px; color: #e05555;
    font-size: 13px;
  }

  /* HISTORY STRIP */
  .history {
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    background: var(--surface);
    display: flex; gap: 8px; align-items: center;
    overflow-x: auto;
  }
  .history-label { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .hist-item {
    flex-shrink: 0; padding: 5px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; cursor: pointer;
    font-size: 11px; color: var(--text2);
    transition: border-color 0.15s;
    white-space: nowrap;
  }
  .hist-item:hover { border-color: var(--accent); color: var(--text); }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .form-panel { border-right: none; border-bottom: 1px solid var(--border); }
    .section-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">K</div>
      <div>
        <div class="logo-text">KisanMind</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="status-dot" id="apiDot"></span>
      <span id="apiStatus">connecting...</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- FORM PANEL -->
    <div class="form-panel">
      <div class="panel-title">Farm Advisory Request</div>

      <div class="field">
        <label>Crop</label>
        <select id="crop">
          <option value="">Select crop...</option>
          <option value="wheat">Wheat</option>
          <option value="rice">Rice</option>
          <option value="cotton">Cotton</option>
          <option value="maize">Maize</option>
          <option value="tomato">Tomato</option>
          <option value="soybean">Soybean</option>
        </select>
      </div>

      <div class="field">
        <label>Location Name</label>
        <input type="text" id="locationName" placeholder="e.g. Pune, Maharashtra"/>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Latitude</label>
          <input type="number" id="lat" placeholder="18.5204" step="0.0001"/>
        </div>
        <div class="field">
          <label>Longitude</label>
          <input type="number" id="lon" placeholder="73.8567" step="0.0001"/>
        </div>
      </div>

      <div class="field">
        <label>Soil Type</label>
        <select id="soilType">
          <option value="">Select soil...</option>
          <option value="black_cotton">Black Cotton (Regur)</option>
          <option value="loamy">Loamy (Alluvial)</option>
          <option value="sandy">Sandy (Arid)</option>
          <option value="clay">Clay (Heavy)</option>
          <option value="red_laterite">Red Laterite</option>
          <option value="sandy_loam">Sandy Loam</option>
        </select>
      </div>

      <div class="field">
        <label>Region</label>
        <select id="region">
          <option value="">Select region...</option>
          <option value="north_india">North India (Punjab, Haryana, UP)</option>
          <option value="south_india">South India (TN, Karnataka, AP)</option>
          <option value="west_india">West India (Gujarat, Maharashtra)</option>
          <option value="east_india">East India (WB, Odisha, Bihar)</option>
          <option value="central_india">Central India (MP, Chhattisgarh)</option>
        </select>
      </div>

      <div class="field">
        <label>Farm Size (acres)</label>
        <input type="number" id="farmSize" placeholder="5.0" step="0.5" min="0.1"/>
      </div>

      <div class="field">
        <label>Additional Context <span style="color:var(--text3)">(optional)</span></label>
        <textarea id="freeText" placeholder="e.g. Soil was waterlogged last month, planning to use drip irrigation..."></textarea>
      </div>

      <button class="btn-run" id="runBtn" onclick="runAdvisory()">
        Run Advisory Engine →
      </button>
    </div>

    <!-- RESULT PANEL -->
    <div class="result-panel" id="resultPanel">
      <div class="empty">
        <div class="empty-icon">⟳</div>
        <h3>No advisory generated yet</h3>
        <p>Fill in the farm details and run the advisory engine to get a complete recommendation.</p>
      </div>
    </div>

  </div>

  <!-- HISTORY -->
  <div class="history" id="historyBar">
    <span class="history-label">Recent</span>
    <span style="font-size:11px;color:var(--text3)">No history yet</span>
  </div>

</div>

<script>
const API = 'http://127.0.0.1:8000/api/v1';
let history = [];

// Check API health
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('apiDot').style.background = d.status === 'healthy' ? '#7daa6f' : '#e07a35';
    document.getElementById('apiStatus').textContent = d.status === 'healthy' ? 'API connected' : 'API degraded';
  } catch {
    document.getElementById('apiDot').style.background = '#e05555';
    document.getElementById('apiStatus').textContent = 'API offline';
  }
}
checkHealth();

async function runAdvisory() {
  const crop = document.getElementById('crop').value;
  const locationName = document.getElementById('locationName').value;
  const lat = parseFloat(document.getElementById('lat').value);
  const lon = parseFloat(document.getElementById('lon').value);
  const soilType = document.getElementById('soilType').value;
  const region = document.getElementById('region').value;
  const farmSize = parseFloat(document.getElementById('farmSize').value);
  const freeText = document.getElementById('freeText').value;

  if (!crop || !locationName || !lat || !lon || !soilType || !region || !farmSize) {
    showError('Please fill in all required fields.');
    return;
  }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  showLoading();

  try {
    const res = await fetch(`${API}/advisory`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        crop, location_name: locationName,
        latitude: lat, longitude: lon,
        soil_type: soilType, region,
        farm_size_acres: farmSize,
        free_text: freeText || null
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail?.message || 'Request failed');
    renderAdvisory(data);
    addHistory(data, locationName, crop);
  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Advisory Engine →';
  }
}

function showLoading() {
  document.getElementById('resultPanel').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Reasoning engine running...</div>
      <div class="loading-step">→ Fetching weather data</div>
      <div class="loading-step">→ Loading crop calendar</div>
      <div class="loading-step">→ Analysing soil profile</div>
      <div class="loading-step">→ Checking market signals</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('resultPanel').innerHTML = `
    <div class="error-card">⚠ ${msg}</div>`;
}

function confClass(c) {
  if (c >= 0.75) return 'conf-high';
  if (c >= 0.5) return 'conf-mid';
  return 'conf-low';
}

function renderAdvisory(d) {
  const conf = (d.confidence * 100).toFixed(0);
  const trace = d.reasoning_trace || [];
  const risks = d.risk_flags || [];
  const actions = d.actions || [];

  let html = `<div class="advisory">`;

  // Recommendation
  html += `
    <div class="rec-card">
      <div class="rec-label">Recommendation</div>
      <div class="rec-text">${d.recommendation}</div>
      <div class="rec-meta">
        <span class="conf-badge ${confClass(d.confidence)}">Confidence: ${conf}%</span>
        <span class="conf-badge">${d.status}</span>
      </div>
    </div>`;

  // Reasoning
  html += `
    <div>
      <div class="sec-head">Reasoning</div>
      <div class="reasoning-card">
        <div class="reasoning-text">${d.reasoning}</div>
      </div>
    </div>`;

  // Three advice cards
  html += `
    <div>
      <div class="sec-head">Advisory Detail</div>
      <div class="section-grid">
        <div class="card">
          <div class="card-label">🌱 Sowing</div>
          <div class="card-value">${d.sowing_advice}</div>
        </div>
        <div class="card">
          <div class="card-label">💧 Irrigation</div>
          <div class="card-value">${d.irrigation_advice}</div>
        </div>
        <div class="card">
          <div class="card-label">📈 Market</div>
          <div class="card-value">${d.market_advice}</div>
        </div>
      </div>
    </div>`;

  // Risk flags
  if (risks.length) {
    html += `<div><div class="sec-head">Risk Flags</div><div class="risk-list">`;
    risks.forEach(r => {
      html += `
        <div class="risk-item">
          <div class="risk-dot ${r.severity}"></div>
          <div>
            <div class="risk-sev ${r.severity}">${r.severity} · ${r.type}</div>
            <div class="risk-msg">${r.message}</div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  }

  // Actions
  if (actions.length) {
    html += `<div><div class="sec-head">Action Plan</div><div class="action-list">`;
    actions.forEach(a => {
      html += `
        <div class="action-item">
          <div class="action-num">${a.priority}</div>
          <div>
            <div class="action-text">${a.action}</div>
            <div class="action-time">${a.timeframe}</div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  }

  // Reasoning trace
  if (trace.length) {
    html += `<div><div class="sec-head">Reasoning Trace</div><div class="trace-list">`;
    trace.forEach(s => {
      html += `
        <div class="trace-item">
          <div class="trace-header">
            <span class="trace-step">step ${s.step_number}</span>
            <span class="trace-tool">${s.tool_name}</span>
            ${s.duration_ms ? `<span class="trace-ms">${s.duration_ms}ms</span>` : ''}
          </div>
          <div class="trace-thought">${s.thought}</div>
        </div>`;
    });
    html += `</div></div>`;
  }

  html += `</div>`;
  document.getElementById('resultPanel').innerHTML = html;
}

function addHistory(data, location, crop) {
  history.unshift({ id: data.session_id, location, crop, conf: data.confidence });
  if (history.length > 8) history.pop();
  const bar = document.getElementById('historyBar');
  bar.innerHTML = `<span class="history-label">Recent</span>` +
    history.map(h => `
      <div class="hist-item" onclick="loadSession('${h.id}')">
        ${h.crop} · ${h.location} · ${(h.conf*100).toFixed(0)}%
      </div>`).join('');
}

async function loadSession(id) {
  showLoading();
  try {
    const r = await fetch(`${API}/advisory/${id}`);
    const d = await r.json();
    renderAdvisory(d);
  } catch(e) { showError(e.message); }
}
</script>
</body>
</html>
